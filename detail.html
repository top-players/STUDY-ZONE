<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Details</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f7fa;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

h1{
    text-align:center;
    color:#222;
    font-size:40px;
}

p{
    text-align:center;
    color:#555;
    font-size:18px;
    margin-bottom:40px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}

.btn{
    display:block;
    width:220px;
    margin:40px auto;
    text-align:center;
    padding:14px;
    background:#ffd700;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <h1>📚 This Is Our Library</h1>

    <p>
        Welcome to our library. We provide a peaceful,
        comfortable and inspiring environment where students
        can focus on their studies and achieve their goals.
    </p>

    <div class="gallery">

        <img src="libimage001.png" alt="Library Photo">
         <img src="libimage003.png" alt="Library Photo">
        <img src="libimage004.png" alt="Library Photo">
        <img src="libimage005.png" alt="Library Photo">
       
    
    </div>

    <a href="index.html" class="btn">← Back To Home</a>

</div>

</body>

<div style="margin-top:40px; text-align:center;">
    
    <h2>🎥 Library Tour Video</h2>

    <video controls style="
        width:100%;
        max-width:800px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,0.3);
    ">
        <source src="libraryvideo.mp4" type="video/mp4">
        Your browser does not support video tag.
    </video>

</div>
</html>
